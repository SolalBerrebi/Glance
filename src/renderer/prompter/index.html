<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glance Prompter</title>
  <link rel="stylesheet" href="prompter.css">
</head>
<body>
  <div class="prompter-container" id="prompter-container">
    <!-- Drag handle -->
    <div class="drag-handle" id="drag-handle"></div>

    <!-- Hover controls -->
    <div class="hover-controls" id="hover-controls">
      <button class="hover-btn" id="btn-play-pause" title="Play/Pause">
        <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="hover-btn" id="btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>
      </button>
    </div>

    <!-- Countdown overlay -->
    <div class="countdown-overlay" id="countdown-overlay" style="display:none;">
      <span class="countdown-number" id="countdown-number">3</span>
    </div>

    <!-- Scroll content -->
    <div class="scroll-wrapper" id="scroll-wrapper">
      <div class="scroll-content" id="scroll-content"></div>
    </div>

    <!-- Voice follow indicator -->
    <div class="voice-indicator" id="voice-indicator" style="display:none;">
      <div class="voice-dot"></div>
      <span class="voice-label" id="voice-label">Listening</span>
    </div>

    <!-- Gradient overlays -->
    <div class="gradient-top"></div>
    <div class="gradient-bottom"></div>
  </div>

  <script src="prompter.js"></script>
</body>
</html>
