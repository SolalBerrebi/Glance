<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moody</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="app-name">Moody</span>
    </div>
    <div class="titlebar-actions">
      <button id="btn-prompter" class="btn-icon" title="Toggle Prompter (Cmd+Shift+P)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
      <button id="btn-settings-toggle" class="btn-icon" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </div>

  <div class="main-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>Scripts</span>
        <button id="btn-new-script" class="btn-small" title="New Script">+ New</button>
      </div>
      <ul class="script-list" id="script-list"></ul>
    </aside>

    <main class="editor-area">
      <div class="editor-header" id="editor-header" style="display:none;">
        <input type="text" id="script-title" class="script-title-input" placeholder="Script title..." />
        <div class="editor-actions">
          <button id="btn-duplicate" class="btn-small" title="Duplicate">Duplicate</button>
          <button id="btn-delete" class="btn-small btn-danger" title="Delete">Delete</button>
        </div>
      </div>
      <div class="editor-empty" id="editor-empty">
        <p>Create or select a script to get started</p>
      </div>
      <textarea id="script-editor" class="script-editor" placeholder="Write your script here..." style="display:none;"></textarea>
    </main>
  </div>

  <div class="controls-bar" id="controls-bar">
    <div class="controls-row">
      <div class="control-group">
        <label>Speed</label>
        <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1.0">
        <span id="speed-label">1.0x</span>
      </div>
      <div class="control-group">
        <label>Font</label>
        <span id="font-size-label">32px</span>
        <button id="btn-font-down" class="btn-small">-</button>
        <button id="btn-font-up" class="btn-small">+</button>
      </div>
      <div class="control-group">
        <label>Countdown</label>
        <select id="countdown-select">
          <option value="3">3s</option>
          <option value="5">5s</option>
          <option value="10">10s</option>
        </select>
      </div>
      <div class="control-group">
        <button id="btn-reset-notch" class="btn-accent">Reset to Notch</button>
      </div>
      <div class="control-group">
        <button id="btn-start" class="btn-accent btn-primary">Start</button>
      </div>
    </div>
  </div>

  <!-- Settings panel (hidden by default) -->
  <div class="settings-panel" id="settings-panel" style="display:none;">
    <h3>Prompter Settings</h3>
    <div class="setting-row">
      <label>Text Color</label>
      <div class="color-presets">
        <button class="color-swatch active" data-color="#FFFFFF" style="background:#FFFFFF;"></button>
        <button class="color-swatch" data-color="#FFFF00" style="background:#FFFF00;"></button>
        <button class="color-swatch" data-color="#00FF00" style="background:#00FF00;"></button>
        <button class="color-swatch" data-color="#00FFFF" style="background:#00FFFF;"></button>
        <input type="color" id="custom-color" value="#FFFFFF" title="Custom color">
      </div>
    </div>
    <div class="setting-row">
      <label>Background Opacity</label>
      <input type="range" id="bg-opacity" min="0.1" max="1" step="0.05" value="0.85">
      <span id="opacity-label">85%</span>
    </div>
    <div class="setting-row">
      <label>Font Weight</label>
      <select id="font-weight-select">
        <option value="normal">Normal</option>
        <option value="bold" selected>Bold</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Line Spacing</label>
      <input type="range" id="line-spacing" min="1" max="2.5" step="0.1" value="1.6">
      <span id="line-spacing-label">1.6</span>
    </div>
    <div class="setting-row">
      <label>Padding</label>
      <input type="range" id="padding-slider" min="5" max="50" step="5" value="20">
      <span id="padding-label">20px</span>
    </div>
    <div class="setting-row">
      <label>Mirror Mode</label>
      <button id="btn-mirror" class="btn-small">Off</button>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
